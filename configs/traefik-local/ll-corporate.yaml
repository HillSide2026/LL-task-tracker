# configs/traefik-local/ll-corporate.yaml
#
# Traefik file-provider routes for ll-corporate.
#
# ll-corporate (next.config.ts) sets basePath="/corporate". All Next.js routes
# are under /corporate. Hitting corporate.localhost/ (no prefix) returns a
# Next.js 404. The redirect router below catches the bare root and sends the
# browser to /corporate so the app entry point is unambiguous.
#
# Two routers:
#   ll-corporate-redirect  — redirects corporate.localhost  → corporate.localhost/corporate
#   ll-corporate           — proxies  corporate.localhost/* → host:3000
#
# host.docker.internal is Docker Desktop for Mac/Windows only.
# Linux: replace with host bridge IP or add extra_hosts to traefik service.

http:
  routers:
    # Redirect bare root to the basePath entry point
    ll-corporate-redirect:
      rule: "Host(`corporate.localhost`) && Path(`/`)"
      entrypoints:
        - web
      middlewares:
        - redirect-to-corporate
      service: ll-corporate

    ll-corporate:
      rule: "Host(`corporate.localhost`)"
      entrypoints:
        - web
      service: ll-corporate

  middlewares:
    redirect-to-corporate:
      redirectRegex:
        regex: "^http://corporate\\.localhost/?$"
        replacement: "http://corporate.localhost/corporate"
        permanent: false

  services:
    ll-corporate:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:3000"
